<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>경기도 7급 경력평정 누적 점수 증가 곡선</title>
<desc>경기도 7급 기준으로 60개월까지는 점수가 빠르게 오르지만 60개월을 넘는 순간부터 증가폭이 크게 줄어든다는 것을 보여주는 꺾은선 그래프</desc>
<defs>
  <style>
    .navy{fill:#0f2340} .gold{fill:#c8a84b} .ink{fill:#1a1a2e} .muted{fill:#6b6b7a}
    .lbl{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
    .sub{font-family:'Noto Serif KR',serif;font-size:11.5px}
    .axis{font-family:'DM Mono',monospace;font-size:11px}
  </style>
</defs>
<rect x="0" y="0" width="700" height="280" fill="#faf8f3"/>

<text x="350" y="26" text-anchor="middle" class="lbl navy">경기도 7급 경력평정 누적 점수 (예시)</text>

<line x1="60" y1="40" x2="60" y2="220" stroke="#d8d0be" stroke-width="1.5"/>
<line x1="60" y1="220" x2="650" y2="220" stroke="#d8d0be" stroke-width="1.5"/>

<line x1="543" y1="40" x2="543" y2="220" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4 3"/>
<text x="551" y="120" class="sub" fill="#c0392b" font-weight="700">60개월</text>
<text x="551" y="136" class="sub" fill="#c0392b" font-weight="700">여기부터 급감</text>

<polyline points="60,220 157,184.7 253,149.4 350,114.2 447,78.9 543,43.6 592,41.8 640,40"
  fill="none" stroke="#c8a84b" stroke-width="3"/>

<circle cx="60" cy="220" r="4" class="navy"/>
<circle cx="157" cy="184.7" r="4" class="navy"/>
<circle cx="253" cy="149.4" r="4" class="navy"/>
<circle cx="350" cy="114.2" r="4" class="navy"/>
<circle cx="447" cy="78.9" r="4" class="navy"/>
<circle cx="543" cy="43.6" r="5" class="gold"/>
<circle cx="592" cy="41.8" r="4" class="navy"/>
<circle cx="640" cy="40" r="5" class="gold"/>

<text x="447" y="68" text-anchor="middle" class="axis navy">23.52점</text>
<text x="543" y="33" text-anchor="middle" class="axis navy" font-weight="700">29.40점</text>
<text x="640" y="30" text-anchor="middle" class="axis navy" font-weight="700">30.00점</text>

<text x="60"  y="236" text-anchor="middle" class="axis muted">0</text>
<text x="157" y="236" text-anchor="middle" class="axis muted">1년</text>
<text x="253" y="236" text-anchor="middle" class="axis muted">2년</text>
<text x="350" y="236" text-anchor="middle" class="axis muted">3년</text>
<text x="447" y="236" text-anchor="middle" class="axis muted">4년</text>
<text x="543" y="236" text-anchor="middle" class="axis muted">5년</text>
<text x="640" y="236" text-anchor="middle" class="axis muted">6년</text>

<text x="350" y="262" text-anchor="middle" class="sub ink">5년(60개월)까지는 월 0.49점씩 오르지만, 그 이후엔 월 0.05점으로 약 10분의 1 수준으로 느려집니다.</text>
</svg>
