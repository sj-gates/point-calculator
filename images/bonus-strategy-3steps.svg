<svg viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" role="img">
<title>가점 극대화 전략 우선순위 3단계</title>
<desc>직무 자격증 취득, 어학 성적 유지, 특수지 근무 고려 순서로 가점을 채우는 3단계 전략을 화살표로 연결한 그림</desc>
<defs>
  <style>
    .navy{fill:#0f2340} .gold{fill:#c8a84b} .paper{fill:#f2ede3} .border{stroke:#d8d0be}
    .ink{fill:#1a1a2e} .muted{fill:#6b6b7a} .white{fill:#ffffff}
    .step{font-family:'DM Mono',monospace;font-size:14px;font-weight:700}
    .lbl{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
    .small{font-family:'Noto Serif KR',serif;font-size:11.5px}
  </style>
</defs>
<rect x="0" y="0" width="700" height="240" fill="#faf8f3"/>

<text x="350" y="26" text-anchor="middle" class="lbl navy">가점 극대화 전략 — 우선순위 3단계</text>

<g>
  <rect x="20" y="50" width="190" height="160" rx="12" fill="#ffffff" class="border"/>
  <circle cx="50" cy="78" r="16" class="gold"/>
  <text x="50" y="83" text-anchor="middle" class="step navy">1</text>
  <text x="115" y="83" text-anchor="middle" class="lbl navy">직무 자격증</text>
  <text x="40" y="116" class="small ink">직렬 관련 국가기술</text>
  <text x="40" y="134" class="small ink">자격증 중 해당 계급</text>
  <text x="40" y="152" class="small ink">인정 자격증을 먼저</text>
  <text x="40" y="170" class="small ink">확인하고 취득</text>
</g>

<polygon points="215,130 245,130 245,122 260,138 245,154 245,146 215,146" class="gold"/>

<g>
  <rect x="255" y="50" width="190" height="160" rx="12" fill="#ffffff" class="border"/>
  <circle cx="285" cy="78" r="16" class="gold"/>
  <text x="285" y="83" text-anchor="middle" class="step navy">2</text>
  <text x="350" y="83" text-anchor="middle" class="lbl navy">어학 성적</text>
  <text x="275" y="116" class="small ink">TOEIC 900점 이상</text>
  <text x="275" y="134" class="small ink">이면 최고 등급.</text>
  <text x="275" y="152" class="small ink">유효기간(2년) 내</text>
  <text x="275" y="170" class="small ink">재취득 필요</text>
</g>

<polygon points="450,130 480,130 480,122 495,138 480,154 480,146 450,146" class="gold"/>

<g>
  <rect x="490" y="50" width="190" height="160" rx="12" fill="#ffffff" class="border"/>
  <circle cx="520" cy="78" r="16" class="gold"/>
  <text x="520" y="83" text-anchor="middle" class="step navy">3</text>
  <text x="585" y="83" text-anchor="middle" class="lbl navy">특수지 근무</text>
  <text x="510" y="116" class="small ink">기피 부서ㆍ특수지</text>
  <text x="510" y="134" class="small ink">근무 경력이 있으면</text>
  <text x="510" y="152" class="small ink">가점 부여. 인사규칙</text>
  <text x="510" y="170" class="small ink">별표 확인 필수</text>
</g>
</svg>
