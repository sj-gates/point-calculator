<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>공무원 근무성적평정 연간 캘린더 — 기준일 유형별 비교</title>
<defs>
  <style>
    .navy{fill:#0f2340} .gold{fill:#c8a84b} .paper{fill:#f2ede3}
    .ink{fill:#1a1a2e} .muted{fill:#6b6b7a}
    .lbl{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
    .sub{font-family:'Noto Serif KR',serif;font-size:12.5px}
    .small{font-family:'Noto Serif KR',serif;font-size:11px}
    .mono{font-family:'DM Mono',monospace;font-size:11px;font-weight:700}
  </style>
</defs>
<rect width="700" height="360" fill="#faf8f3"/>

<text x="350" y="26" text-anchor="middle" class="lbl navy">연간 평정 캘린더 — 기준일 유형 비교</text>

<!-- 월 눈금 (x=60 ~ x=660, 12칸 각 50px) -->
<g font-family="'DM Mono',monospace" font-size="10" font-weight="700" fill="#888899">
  <text x="85"  y="44" text-anchor="middle">1월</text>
  <text x="135" y="44" text-anchor="middle">2월</text>
  <text x="185" y="44" text-anchor="middle">3월</text>
  <text x="235" y="44" text-anchor="middle">4월</text>
  <text x="285" y="44" text-anchor="middle">5월</text>
  <text x="335" y="44" text-anchor="middle">6월</text>
  <text x="385" y="44" text-anchor="middle">7월</text>
  <text x="435" y="44" text-anchor="middle">8월</text>
  <text x="485" y="44" text-anchor="middle">9월</text>
  <text x="535" y="44" text-anchor="middle">10월</text>
  <text x="585" y="44" text-anchor="middle">11월</text>
  <text x="635" y="44" text-anchor="middle">12월</text>
</g>
<g stroke="#d8d0be" stroke-width="1">
  <line x1="60"  y1="47" x2="60"  y2="52"/>
  <line x1="110" y1="47" x2="110" y2="52"/>
  <line x1="160" y1="47" x2="160" y2="52"/>
  <line x1="210" y1="47" x2="210" y2="52"/>
  <line x1="260" y1="47" x2="260" y2="52"/>
  <line x1="310" y1="47" x2="310" y2="52"/>
  <line x1="360" y1="47" x2="360" y2="52"/>
  <line x1="410" y1="47" x2="410" y2="52"/>
  <line x1="460" y1="47" x2="460" y2="52"/>
  <line x1="510" y1="47" x2="510" y2="52"/>
  <line x1="560" y1="47" x2="560" y2="52"/>
  <line x1="610" y1="47" x2="610" y2="52"/>
  <line x1="660" y1="47" x2="660" y2="52"/>
</g>

<!-- ══════════════════════════════════
     유형 A : 6월 30일 / 12월 31일
══════════════════════════════════ -->
<!-- 섹션 타이틀 -->
<rect x="30" y="58" width="640" height="22" rx="5" fill="#0f2340"/>
<text x="350" y="73" text-anchor="middle" class="small" fill="#c8a84b" font-weight="700">유형 A — 기준일: 6월 30일 / 12월 31일  (대부분의 기관)</text>

<!-- 상반기 누적 바 (1~5월) -->
<rect x="60" y="88" width="250" height="26" rx="4" fill="#dde4f0"/>
<text x="185" y="104" text-anchor="middle" class="small ink">상반기 근무성적 누적 (1~5월)</text>

<!-- 기준일 6/30 -->
<rect x="310" y="84" width="50" height="34" rx="5" fill="#0f2340"/>
<text x="335" y="99" text-anchor="middle" class="mono" fill="#c8a84b">6/30</text>
<text x="335" y="112" text-anchor="middle" class="small" fill="#c8a84b">기준일</text>

<!-- 하반기 누적 바 (7~11월) -->
<rect x="360" y="88" width="250" height="26" rx="4" fill="#dde4f0"/>
<text x="485" y="104" text-anchor="middle" class="small ink">하반기 근무성적 누적 (7~11월)</text>

<!-- 기준일 12/31 -->
<rect x="610" y="84" width="50" height="34" rx="5" fill="#0f2340"/>
<text x="635" y="99" text-anchor="middle" class="mono" fill="#c8a84b">12/31</text>
<text x="635" y="112" text-anchor="middle" class="small" fill="#c8a84b">기준일</text>

<!-- 명부발효 A: 1월, 7월 -->
<line x1="85" y1="118" x2="85" y2="148" stroke="#7b68ee" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="85" y="138" text-anchor="middle" class="small" fill="#7b68ee" font-weight="700">1월 명부발효</text>

<line x1="385" y1="118" x2="385" y2="148" stroke="#7b68ee" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="385" y="138" text-anchor="middle" class="small" fill="#7b68ee" font-weight="700">7월 명부발효</text>

<!-- ── 구분선 ── -->
<line x1="30" y1="164" x2="670" y2="164" stroke="#c8a84b" stroke-width="1.5"/>

<!-- ══════════════════════════════════
     유형 B : 4월 30일 / 10월 31일
══════════════════════════════════ -->
<!-- 섹션 타이틀 -->
<rect x="30" y="172" width="640" height="22" rx="5" fill="#5a3d00"/>
<text x="350" y="187" text-anchor="middle" class="small" fill="#f0d080" font-weight="700">유형 B — 기준일: 4월 30일 / 10월 31일  (일부 기관)</text>

<!-- 상반기 누적 바 (1~3월) -->
<rect x="60" y="202" width="150" height="26" rx="4" fill="#f0e8c8"/>
<text x="135" y="218" text-anchor="middle" class="small ink">상반기 누적 (1~3월)</text>

<!-- 기준일 4/30 -->
<rect x="210" y="198" width="50" height="34" rx="5" fill="#5a3d00"/>
<text x="235" y="213" text-anchor="middle" class="mono" fill="#f0d080">4/30</text>
<text x="235" y="226" text-anchor="middle" class="small" fill="#f0d080">기준일</text>

<!-- 하반기 누적 바 (5~9월) -->
<rect x="260" y="202" width="250" height="26" rx="4" fill="#f0e8c8"/>
<text x="385" y="218" text-anchor="middle" class="small ink">하반기 누적 (5~9월)</text>

<!-- 기준일 10/31 -->
<rect x="510" y="198" width="50" height="34" rx="5" fill="#5a3d00"/>
<text x="535" y="213" text-anchor="middle" class="mono" fill="#f0d080">10/31</text>
<text x="535" y="226" text-anchor="middle" class="small" fill="#f0d080">기준일</text>

<!-- 이후 누적 (11~12월) -->
<rect x="560" y="202" width="100" height="26" rx="4" fill="#f0e8c8"/>
<text x="610" y="218" text-anchor="middle" class="small ink">11~12월 누적</text>

<!-- 명부발효 B: 5월, 11월 -->
<line x1="285" y1="232" x2="285" y2="262" stroke="#7b68ee" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="285" y="252" text-anchor="middle" class="small" fill="#7b68ee" font-weight="700">5월 명부발효</text>

<line x1="560" y1="232" x2="560" y2="262" stroke="#7b68ee" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="560" y="252" text-anchor="middle" class="small" fill="#7b68ee" font-weight="700">11월 명부발효</text>

<!-- ── 범례 ── -->
<rect x="30" y="278" width="640" height="52" rx="8" fill="#f2ede3"/>

<rect x="50" y="292" width="22" height="12" rx="3" fill="#0f2340"/>
<text x="78" y="303" class="small ink">기준일 A형 (6/30·12/31)</text>

<rect x="50" y="312" width="22" height="12" rx="3" fill="#5a3d00"/>
<text x="78" y="323" class="small ink">기준일 B형 (4/30·10/31)</text>

<rect x="240" y="292" width="22" height="12" rx="3" fill="#dde4f0"/>
<text x="268" y="303" class="small ink">A형 근무성적 누적 기간</text>

<rect x="240" y="312" width="22" height="12" rx="3" fill="#f0e8c8"/>
<text x="268" y="323" class="small ink">B형 근무성적 누적 기간</text>

<line x1="440" y1="298" x2="468" y2="298" stroke="#7b68ee" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="475" y="303" class="small ink">명부 발효 시점</text>
<text x="440" y="323" class="small muted">결원 발생 시 순위대로 승진 발령</text>

<text x="350" y="346" text-anchor="middle" class="small muted">※ 소속 기관의 기준일은 인사담당 부서에 확인하세요.</text>
</svg>
