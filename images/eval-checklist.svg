<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>평정 기준일 전 행동 체크리스트</title>
<desc>기준일 3개월 전부터 직후까지 단계별로 해야 할 행동을 타임라인 형식으로 정리한 체크리스트</desc>
<defs>
  <style>
    .navy{fill:#0f2340} .gold{fill:#c8a84b} .paper{fill:#f2ede3}
    .ink{fill:#1a1a2e} .muted{fill:#6b6b7a} .red{fill:#c0392b}
    .lbl{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
    .sub{font-family:'Noto Serif KR',serif;font-size:12px}
    .badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700}
  </style>
</defs>
<rect x="0" y="0" width="700" height="280" fill="#faf8f3"/>

<text x="350" y="28" text-anchor="middle" class="lbl navy">기준일 전후 행동 체크리스트</text>

<!-- timeline line -->
<line x1="60" y1="90" x2="640" y2="90" stroke="#d8d0be" stroke-width="2"/>

<!-- step 1: 3개월 전 -->
<circle cx="100" cy="90" r="14" fill="#0f2340"/>
<text x="100" y="95" text-anchor="middle" class="badge" fill="#c8a84b">D-90</text>
<rect x="44" y="112" width="112" height="130" rx="8" fill="#0f2340"/>
<line x1="100" y1="104" x2="100" y2="112" stroke="#0f2340" stroke-width="2"/>
<text x="100" y="132" text-anchor="middle" class="sub" fill="#c8a84b" font-weight="700">3개월 전</text>
<text x="100" y="150" text-anchor="middle" class="sub" fill="#c7cde0">어학 성적</text>
<text x="100" y="166" text-anchor="middle" class="sub" fill="#c7cde0">유효기간 확인</text>
<text x="100" y="188" text-anchor="middle" class="sub" fill="#9aa3b5">취득일로부터</text>
<text x="100" y="204" text-anchor="middle" class="sub" fill="#9aa3b5">2년 이내인지</text>
<text x="100" y="220" text-anchor="middle" class="sub" fill="#9aa3b5">점검·재취득</text>

<!-- step 2: 2개월 전 -->
<circle cx="250" cy="90" r="14" fill="#0f2340"/>
<text x="250" y="95" text-anchor="middle" class="badge" fill="#c8a84b">D-60</text>
<rect x="194" y="112" width="112" height="130" rx="8" fill="#0f2340"/>
<line x1="250" y1="104" x2="250" y2="112" stroke="#0f2340" stroke-width="2"/>
<text x="250" y="132" text-anchor="middle" class="sub" fill="#c8a84b" font-weight="700">2개월 전</text>
<text x="250" y="150" text-anchor="middle" class="sub" fill="#c7cde0">자격증 취득</text>
<text x="250" y="166" text-anchor="middle" class="sub" fill="#c7cde0">마감 점검</text>
<text x="250" y="188" text-anchor="middle" class="sub" fill="#9aa3b5">최종 합격·</text>
<text x="250" y="204" text-anchor="middle" class="sub" fill="#9aa3b5">자격증 발급까지</text>
<text x="250" y="220" text-anchor="middle" class="sub" fill="#9aa3b5">완료해야 반영</text>

<!-- step 3: 직전 -->
<circle cx="420" cy="90" r="14" fill="#c8a84b"/>
<text x="420" y="95" text-anchor="middle" class="badge navy">D-0</text>
<rect x="364" y="112" width="112" height="130" rx="8" fill="#c8a84b"/>
<line x1="420" y1="104" x2="420" y2="112" stroke="#c8a84b" stroke-width="2"/>
<text x="420" y="132" text-anchor="middle" class="sub navy" font-weight="700">기준일 직전</text>
<text x="420" y="150" text-anchor="middle" class="sub navy">복직·복귀</text>
<text x="420" y="166" text-anchor="middle" class="sub navy">일정 조율</text>
<text x="420" y="188" text-anchor="middle" class="sub" fill="#3a3010">휴직·파견 중이면</text>
<text x="420" y="204" text-anchor="middle" class="sub" fill="#3a3010">기준일 전 복직</text>
<text x="420" y="220" text-anchor="middle" class="sub" fill="#3a3010">→ 해당반기 근평</text>

<!-- step 4: 직후 -->
<circle cx="590" cy="90" r="14" fill="#f2ede3"/>
<text x="590" y="95" text-anchor="middle" class="badge navy">D+</text>
<rect x="534" y="112" width="112" height="130" rx="8" fill="#f2ede3"/>
<line x1="590" y1="104" x2="590" y2="112" stroke="#d8d0be" stroke-width="2"/>
<text x="590" y="132" text-anchor="middle" class="sub ink" font-weight="700">기준일 직후</text>
<text x="590" y="150" text-anchor="middle" class="sub ink">평정 결과</text>
<text x="590" y="166" text-anchor="middle" class="sub ink">확인·이의 검토</text>
<text x="590" y="188" text-anchor="middle" class="sub muted">가점 누락·경력</text>
<text x="590" y="204" text-anchor="middle" class="sub muted">오산정 발견 시</text>
<text x="590" y="220" text-anchor="middle" class="sub muted">인사부서 즉시 문의</text>

<text x="350" y="260" text-anchor="middle" class="sub muted">기준일(통상 6월 30일·12월 31일)은 기관에 따라 4월 30일·10월 31일로 운영될 수 있습니다.</text>
</svg>
