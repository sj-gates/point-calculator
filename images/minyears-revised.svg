<svg viewBox="0 0 700 330" xmlns="http://www.w3.org/2000/svg" role="img">
<title>공무원 직급별 승진소요 최저연수 개정 전후 비교</title>
<desc>지방공무원임용령 개정으로 9급→8급은 1년 6개월에서 1년으로, 8급→7급과 7급→6급은 2년에서 1년으로, 6급→5급은 3년 6개월에서 2년으로, 5급→4급은 4년에서 3년으로 단축된 것을 비교하는 표</desc>
<defs>
  <style>
    .navy{fill:#0f2340} .gold{fill:#c8a84b} .paper{fill:#f2ede3}
    .ink{fill:#1a1a2e} .muted{fill:#6b6b7a} .red{fill:#c0392b}
    .lbl{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
    .htext{font-family:'Noto Serif KR',serif;font-size:12.5px;font-weight:700;fill:#ffffff}
    .cell{font-family:'Noto Serif KR',serif;font-size:12.5px}
    .cellb{font-family:'DM Mono',monospace;font-size:13.5px;font-weight:700}
    .badge{font-family:'Noto Serif KR',serif;font-size:11px;font-weight:700}
  </style>
</defs>
<rect width="700" height="330" fill="#faf8f3"/>

<text x="350" y="28" text-anchor="middle" class="lbl navy">직급별 승진소요 최저연수 — 개정 전후 비교</text>

<!-- 헤더 -->
<g>
  <rect x="40" y="44" width="150" height="30" fill="#0f2340"/>
  <rect x="190" y="44" width="150" height="30" fill="#0f2340"/>
  <rect x="340" y="44" width="160" height="30" fill="#c8a84b"/>
  <rect x="500" y="44" width="160" height="30" fill="#0f2340"/>
  <text x="115" y="64" text-anchor="middle" class="htext">승진 구간</text>
  <text x="265" y="64" text-anchor="middle" class="htext">기존 최저연수</text>
  <text x="420" y="64" text-anchor="middle" class="htext" fill="#0f2340">개정 후 (현재)</text>
  <text x="580" y="64" text-anchor="middle" class="htext">단축 기간</text>
</g>

<!-- 행 1: 9→8 -->
<rect x="40" y="74" width="620" height="36" fill="#ffffff"/>
<text x="115" y="97" text-anchor="middle" class="cell ink" font-weight="700">9급 → 8급</text>
<text x="265" y="97" text-anchor="middle" class="cell muted">1년 6개월</text>
<text x="420" y="97" text-anchor="middle" class="cellb navy">1년</text>
<text x="580" y="97" text-anchor="middle" class="badge red">▼ 6개월 단축</text>

<!-- 행 2: 8→7 -->
<rect x="40" y="110" width="620" height="36" fill="#f2ede3"/>
<text x="115" y="133" text-anchor="middle" class="cell ink" font-weight="700">8급 → 7급</text>
<text x="265" y="133" text-anchor="middle" class="cell muted">2년</text>
<text x="420" y="133" text-anchor="middle" class="cellb navy">1년</text>
<text x="580" y="133" text-anchor="middle" class="badge red">▼ 1년 단축</text>

<!-- 행 3: 7→6 -->
<rect x="40" y="146" width="620" height="36" fill="#ffffff"/>
<text x="115" y="169" text-anchor="middle" class="cell ink" font-weight="700">7급 → 6급</text>
<text x="265" y="169" text-anchor="middle" class="cell muted">2년</text>
<text x="420" y="169" text-anchor="middle" class="cellb navy">1년</text>
<text x="580" y="169" text-anchor="middle" class="badge red">▼ 1년 단축</text>

<!-- 행 4: 6→5 -->
<rect x="40" y="182" width="620" height="36" fill="#f2ede3"/>
<text x="115" y="205" text-anchor="middle" class="cell ink" font-weight="700">6급 → 5급</text>
<text x="265" y="205" text-anchor="middle" class="cell muted">3년 6개월</text>
<text x="420" y="205" text-anchor="middle" class="cellb navy">2년</text>
<text x="580" y="205" text-anchor="middle" class="badge red">▼ 1년 6개월 단축</text>

<!-- 행 5: 5→4 -->
<rect x="40" y="218" width="620" height="36" fill="#ffffff"/>
<text x="115" y="241" text-anchor="middle" class="cell ink" font-weight="700">5급 → 4급</text>
<text x="265" y="241" text-anchor="middle" class="cell muted">4년</text>
<text x="420" y="241" text-anchor="middle" class="cellb navy">3년</text>
<text x="580" y="241" text-anchor="middle" class="badge red">▼ 1년 단축</text>

<!-- 행 6: 4→3 -->
<rect x="40" y="254" width="620" height="36" fill="#f2ede3"/>
<text x="115" y="277" text-anchor="middle" class="cell ink" font-weight="700">4급 → 3급</text>
<text x="265" y="277" text-anchor="middle" class="cell muted">3년</text>
<text x="420" y="277" text-anchor="middle" class="cellb navy">3년</text>
<text x="580" y="277" text-anchor="middle" class="badge muted">— 동일</text>

<!-- 개정후 열 강조 테두리 -->
<rect x="340" y="44" width="160" height="246" fill="none" stroke="#c8a84b" stroke-width="2"/>

<text x="350" y="316" text-anchor="middle" class="cell muted">※ 지방공무원임용령 개정 기준. 기관별 인사규칙으로 더 긴 연수를 정할 수 있으니 소속 기관 기준을 확인하세요.</text>
</svg>
