<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 — 공스코어</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0f2340;--gold:#c8a84b;--cream:#faf8f3;--paper:#f2ede3;--ink:#1a1a2e;--muted:#6b6b7a;--border:#d8d0be;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Serif KR',serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
  .code{font-family:'DM Mono',monospace;font-size:5rem;font-weight:500;color:var(--navy);letter-spacing:.04em;}
  .gold-line{width:48px;height:2px;background:var(--gold);margin:18px auto;}
  h1{font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:10px;}
  p{font-size:.9rem;color:var(--muted);line-height:1.8;margin-bottom:28px;}
  .btn{display:inline-block;background:var(--navy);color:var(--gold);font-weight:700;font-family:'Noto Serif KR',serif;padding:13px 30px;border-radius:8px;text-decoration:none;font-size:.95rem;}
  .btn:hover{opacity:.9;}
  .links{margin-top:26px;font-size:.82rem;}
  .links a{color:var(--muted);text-decoration:none;margin:0 10px;}
  .links a:hover{color:var(--gold);}
</style>
</head>
<body>
  <div class="code">404</div>
  <div class="gold-line"></div>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>주소가 바뀌었거나 삭제된 페이지입니다.<br>아래 버튼으로 계산기 홈으로 이동해 주세요.</p>
  <a class="btn" href="/">🏆 평정점수 계산기 홈으로</a>
  <div class="links">
    <a href="/promotion-faq.html">승진 FAQ</a> ·
    <a href="/performance-rating-guide.html">근평 가이드</a> ·
    <a href="/career-rating-guide.html">경력평정 가이드</a>
  </div>
</body>
</html>
